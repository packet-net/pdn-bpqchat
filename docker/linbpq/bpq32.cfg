# bpq32.cfg for the pdn-bpqchat interop oracle (HANDOVER.md §6).
#
# PLACEHOLDER — a minimal LinBPQ node config skeleton. W5 finalises the CHAT application and the
# chat node-link configuration against the vendored BPQ source (reference/linbpq-chat/) and the real
# bpq32.cfg in packet.net's docker/linbpq, so pdn-bpqchat can link to this node and drive a user into
# it. Do not treat this as a working node config yet — it documents intent and pins the shape.
#
# What W5 must set here (derived in design.md §3, §5):
#   - a NODE identity (callsign/alias) for the oracle;
#   - a telnet listener so a test "user" can connect and join chat;
#   - the CHAT APPLICATION directive (the chat-node app number / MaxStreams — cf. chatconfig.cfg
#     ApplNum=2, MaxStreams=11 in the vendored source);
#   - OtherChatNodes / the chat node-link config so the oracle will accept a *RTL link from
#     pdn-bpqchat's bound callsign (the allow-list — design.md §4.1);
#   - the node-link transport the quick dev loop uses (telnet/AXUDP), plus a net-sim AFSK channel
#     for the RF-link realism pass (W6).

NODECALL=GB7CHT
NODEALIAS=ORACLE

# (W5) APPLICATION 2,CHAT,...           ; the CHAT application — see reference/linbpq-chat/chatconfig.cfg
# (W5) PORT ... TELNET ...              ; user login path for end-to-end tests
# (W5) chat node-link + OtherChatNodes  ; accept a *RTL link from pdn-bpqchat
