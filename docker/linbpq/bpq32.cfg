; bpq32.cfg for the pdn-bpqchat interop oracle — a LinBPQ CHAT node.
;
; VALIDATED 2026-06-13 against m0lte/linbpq:latest (G8BPQ 6.0.25.28): this config
; boots a working chat node ("Chat Started"), and a telnet user can enter CHAT,
; see the [BPQChatServer-…] banner, land in topic [General], and chat. Run the
; container with the `chat` argument so the chat subsystem starts (see
; docker/compose.oracle.yml).
;
; Chat is APPLICATION 2 to match the chat subsystem's default ApplNum=2 (the
; auto-created /data/chatconfig.cfg). Without APPL2CALL the node logs
; "No APPLCALL for Chat APPL / Chat Init Failed".

SIMPLE=1
NODECALL=GB7PDN
NODEALIAS=PDNTST
LOCATOR=IO91WM

APPLICATIONS=BBS,CHAT
APPL1CALL=GB7PDN-1
APPL1ALIAS=BBS
APPL2CALL=GB7PDN-2
APPL2ALIAS=CHAT

PORT
 ID=Telnet
 DRIVER=Telnet
 CONFIG
 TCPPORT=8010
 HTTPPORT=8008
 MAXSESSIONS=10
 ; Drive a "user" into chat for end-to-end tests: telnet 8010, log in admin/admin,
 ; then type CHAT.
 USER=admin,admin,GB7PDN,,SYSOP
ENDPORT

; --- Linking pdn-bpqchat to this node (the integration step) ---
;
; BPQ chat node-LINKS ride AX.25, not telnet (design.md §5): a peer is
; authenticated by its AX.25 callsign and must be listed as another chat node.
; To link pdn-bpqchat (reached through a pdn node over AX.25/axudp) add, when the
; pdn node + axudp port are in place:
;
;   1. an AXIP/AXUDP PORT block (DRIVER=BPQAXIP) carrying AX.25 to the pdn node
;      over UDP — see packet.net docker/linbpq/bpq32.cfg for a worked AXUDP port;
;   2. the pdn-bpqchat chat callsign in the chat node-link config
;      (/data/chatconfig.cfg OtherChatNodes, a connect script reaching it), so
;      LinBPQ will accept/originate a *RTL link to it.
;
; pdn-bpqchat then links with PDN_BPQCHAT_PEERS=rf:GB7PDN-2 (dial the chat
; callsign over AX.25 via RHP). See docs/LAB.md.
