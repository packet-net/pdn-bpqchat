# The BPQ-chat interop oracle (HANDOVER.md §6) — a real LinBPQ CHAT node that
# pdn-bpqchat develops and tests against as ground truth. Reuses the m0lte/linbpq
# image already used by packet.net's interop stack; you do NOT build BPQ.
#
# VALIDATED 2026-06-13: this brings up a working chat node. A telnet user can
# enter CHAT and chat (telnet 127.0.0.1:8010, login admin/admin, type CHAT). See
# docs/LAB.md for the full lab (pdn node + pdn-bpqchat linked over AXUDP).
#
# The `chat` command argument is REQUIRED — it starts the chat subsystem (the
# image's entrypoint execs `linbpq "$@"`); without it the node runs but chat
# never starts.

services:
  linbpq-chat:
    image: m0lte/linbpq:latest
    container_name: pdnbpqchat-oracle
    restart: unless-stopped
    command: ["chat"]
    volumes:
      - ./linbpq/bpq32.cfg:/data/bpq32.cfg:ro
    ports:
      - "127.0.0.1:8010:8010"      # telnet node prompt (drive a user into CHAT)
      - "127.0.0.1:8008:8008"      # web UI
      # AXUDP listener for the AX.25 chat node-link to the pdn node (add the
      # BPQAXIP PORT block to bpq32.cfg first — see docs/LAB.md):
      # - "127.0.0.1:8093:8093/udp"
    healthcheck:
      # The LinBPQ image has bash but no curl/nc — probe the HTTP listener with
      # bash's /dev/tcp builtin (succeeds once the node has bound 8008).
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8008 && exec 3<&-"]
      interval: 5s
      timeout: 3s
      retries: 10
