; bpq32.cfg — tier-2 CYCLE oracle: a LinBPQ CHAT node linked to TWO pdn nodes.
;
; Used by compose.cycle.yml to form a 3-node cycle (triangle):
;   M0LTE-4 (pdnA) — GB7PDN-2 (this BPQ) — G0XYZ-4 (pdnB) — M0LTE-4
; proving on the wire that a cyclic chat-node graph does not loop-storm.

SIMPLE=1
NODECALL=GB7PDN
NODEALIAS=PDNTST
LOCATOR=IO91WM

APPLICATIONS=BBS,CHAT
APPL1CALL=GB7PDN-1
APPL1ALIAS=BBS
APPL2CALL=GB7PDN-2
APPL2ALIAS=CHAT

PORT
 ID=Telnet
 DRIVER=Telnet
 CONFIG
 TCPPORT=8010
 HTTPPORT=8008
 MAXSESSIONS=10
 USER=admin,admin,GB7PDN,,SYSOP
ENDPORT

; One BPQAXIP UDP port serves BOTH pdn nodes; each is learned/mapped by its
; chat callsign. Static MAPs give a stable reply + originate route to each.
PORT
 ID=AXIP
 DRIVER=BPQAXIP
 QUALITY=200
 MINQUAL=1
 CONFIG
 UDP 8093
 AUTOADDQUIET
 MAP M0LTE-4 172.31.1.20 UDP 8093
 MAP G0XYZ-4 172.31.1.21 UDP 8093
ENDPORT
