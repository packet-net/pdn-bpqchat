; bpq32.cfg — tier-2 interop oracle: a LinBPQ CHAT node reachable over AXUDP.
;
; Extends docker/linbpq/bpq32.cfg (the tier-1 chat oracle) with a BPQAXIP
; (AXIP/AXUDP) port so the pdn node can carry AX.25 to it over UDP. Run with the
; `chat` argument so the chat subsystem starts (see compose.tier2.yml).

SIMPLE=1
NODECALL=GB7PDN
NODEALIAS=PDNTST
LOCATOR=IO91WM

APPLICATIONS=BBS,CHAT
APPL1CALL=GB7PDN-1
APPL1ALIAS=BBS
APPL2CALL=GB7PDN-2
APPL2ALIAS=CHAT

PORT
 ID=Telnet
 DRIVER=Telnet
 CONFIG
 TCPPORT=8010
 HTTPPORT=8008
 MAXSESSIONS=10
 USER=admin,admin,GB7PDN,,SYSOP
ENDPORT

; AXIP / AXUDP port (BPQAXIP driver) — AX.25 frames over UDP, port 2.
;
; FCS is mandatory on this driver (bpqaxip.c drops datagrams whose CRC-16/X.25
; residue != 0xf0b8). pdn's AXUDP transport always carries the 2-octet FCS and
; uses the identical CRC, so they interoperate out of the box.
;
; AUTOADDQUIET auto-learns the reply route (M0LTE-4 -> pdn-node-ip:port) from the
; inbound SABM. The static MAP also lets LinBPQ ORIGINATE to M0LTE-4 (reverse
; direction / the 3-node cycle test). 172.31.0.20 = the pdn node's fixed IP on
; the lab bridge; UDP 8093 = its AXUDP localPort.
PORT
 ID=AXIP
 DRIVER=BPQAXIP
 QUALITY=200
 MINQUAL=1
 CONFIG
 UDP 8093
 AUTOADDQUIET
 MAP M0LTE-4 172.31.0.20 UDP 8093
ENDPORT
