name: release

# Cross-compiles the pdn-bpqchat static binary for amd64/arm64/armhf, packages each as a
# self-contained .deb app package, and attaches the .debs (+ SHA256SUMS) to a GitHub Release.
# Triggered by a `v*` tag or manual dispatch.
#
# Go's CGO-free cross-compile (GOARCH) builds all three arches on one self-hosted x64 job — no
# arch-native runners, no cross C-toolchain, no bundled runtime (pure-Go SQLite is linked in). This
# is exactly why the project is Go (HANDOVER.md language decision). Self-hosted x64 only.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without the v prefix, e.g. 0.0.1'
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Go version
        run: go version

      - id: v
        name: Resolve version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .debs (amd64 / arm64 / armhf)
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          for arch in amd64 arm64 arm; do
            scripts/build-deb.sh "$arch" "$VERSION"
          done

      - name: Checksum + create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          ( cd artifacts && sha256sum pdn-bpqchat_*.deb > SHA256SUMS && ls -l pdn-bpqchat_*.deb SHA256SUMS )
          gh release create "v${VERSION}" artifacts/pdn-bpqchat_*.deb artifacts/SHA256SUMS \
            --repo "${{ github.repository }}" \
            --title "pdn-bpqchat v${VERSION}" \
            --notes "BPQ-Chat-compatible chat node app package for the Packet.NET node (pdn) ${VERSION} — static \`.deb\`s for amd64 / arm64 / armhf. Install on a box already running the packetnet node host: \`sudo apt install ./pdn-bpqchat_${VERSION}_<arch>.deb\` (single static Go binary, no runtime needed); the app lands under /usr/share/packetnet/apps/bpqchat and you enable it from the node control panel (default off). State (bpqchat.db) lives in /var/lib/packetnet/apps/bpqchat and is preserved across upgrades."

      # Once a release is cut, raise the packet.net side to bundle this default-off in the node .deb
      # (stage from the published release like DAPPS) — mirror packet.net #403 (HANDOVER.md §7, W7).
